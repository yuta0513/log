<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>log</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg:      #141414;
      --surface: #1f1f1f;
      --fg:      #ececec;
      --muted:   #555;
      --danger:  #ff453a;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .log-scroll {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 24px 20px 8px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .log-scroll::before { content: ''; flex: 1; }

    .log-item {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .log-time {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .log-text {
      font-size: 16px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .bottom {
      flex-shrink: 0;
      padding: 10px 16px max(env(safe-area-inset-bottom), 16px);
      display: flex;
      flex-direction: column;
      gap: 8px;
      border-top: 1px solid #2a2a2a;
    }

    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      background: var(--surface);
      border: 1px solid #333;
      border-radius: 14px;
      padding: 10px 8px 10px 14px;
    }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--fg);
      font-size: 16px;
      font-family: inherit;
      line-height: 1.5;
      resize: none;
      max-height: 110px;
      overflow-y: auto;
      caret-color: var(--fg);
    }

    textarea::placeholder { color: #444; }

    .send-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px;
      color: #444;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s;
    }

    .send-btn.active { color: var(--fg); }

    .action-row {
      display: flex;
      gap: 8px;
    }

    .action-row.hidden { display: none; }

    .action-btn {
      flex: 1;
      height: 40px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .action-btn:active { opacity: 0.6; }

    .copy-btn {
      background: #2a2a2a;
      color: var(--fg);
      border: 1px solid #383838;
    }

    .obsidian-btn {
      background: #2a2a2a;
      color: #a78bfa;
      border: 1px solid #3a3050;
      display: none; /* Mac only — shown via JS */
    }

    .clear-btn {
      background: transparent;
      color: var(--danger);
      border: 1px solid #3a2020;
    }

    .sync-status {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      letter-spacing: 0.02em;
      min-height: 14px;
    }

    .toast {
      position: fixed;
      bottom: 110px;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: #2a2a2a;
      color: var(--fg);
      font-size: 13px;
      padding: 7px 16px;
      border-radius: 20px;
      opacity: 0;
      transition: opacity 0.18s, transform 0.18s;
      pointer-events: none;
      white-space: nowrap;
      border: 1px solid #383838;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

  <div class="log-scroll" id="logList"></div>

  <div class="bottom">
    <div class="action-row hidden" id="actionRow">
      <button class="action-btn copy-btn"     id="copyBtn">コピー</button>
      <button class="action-btn obsidian-btn" id="obsidianBtn">Obsidian</button>
      <button class="action-btn clear-btn"    id="clearBtn">クリア</button>
    </div>
    <div class="input-row">
      <textarea id="input" placeholder="メモ" rows="1" autofocus autocomplete="off" autocorrect="off"></textarea>
      <button class="send-btn" id="sendBtn" type="button" aria-label="送信">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="11" stroke="currentColor" stroke-width="1.5"/>
          <path d="M12 16.5V7.5M8.5 11L12 7.5L15.5 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <div class="sync-status" id="syncStatus"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ── Config ──────────────────────────────────────────────
    const PROJECT   = 'logmemo-b0ad6';
    const API_KEY   = 'AIzaSyDi-IgAIU9ZD_ahESxqeDD5sJLOYO8HVz4';
    const BASE_URL  = `https://firestore.googleapis.com/v1/projects/${PROJECT}/databases/(default)/documents/logs`;
    const CACHE_KEY = 'log_entries';

    // ── Elements ─────────────────────────────────────────────
    const inputEl      = document.getElementById('input');
    const sendBtn      = document.getElementById('sendBtn');
    const logList      = document.getElementById('logList');
    const actionRow    = document.getElementById('actionRow');
    const copyBtn      = document.getElementById('copyBtn');
    const obsidianBtn  = document.getElementById('obsidianBtn');
    const clearBtn     = document.getElementById('clearBtn');
    const syncStatus   = document.getElementById('syncStatus');
    const toastEl      = document.getElementById('toast');

    // ── State ─────────────────────────────────────────────────
    let entries = [];
    let obsidianFileHandle = null;

    // Mac判定 (File System Access API が使える環境)
    const isMac = /Macintosh/.test(navigator.userAgent) && 'showOpenFilePicker' in window;
    if (isMac) obsidianBtn.style.display = 'flex';

    // ── Firestore REST helpers ────────────────────────────────
    function docToEntry(doc) {
      const f = doc.fields || {};
      const tsRaw = f.ts?.timestampValue || f.ts?.stringValue || '';
      return {
        id:   doc.name.split('/').pop(),
        text: f.text?.stringValue || '',
        ts:   tsRaw
      };
    }

    async function fetchEntries() {
      const res = await fetch(`${BASE_URL}?key=${API_KEY}&pageSize=300`);
      if (!res.ok) throw new Error(`fetch failed: ${res.status}`);
      const data = await res.json();
      const docs = (data.documents || []).map(docToEntry);
      docs.sort((a, b) => new Date(a.ts) - new Date(b.ts));
      return docs;
    }

    async function addEntry(text) {
      const res = await fetch(`${BASE_URL}?key=${API_KEY}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          fields: {
            text: { stringValue: text },
            ts:   { timestampValue: new Date().toISOString() }
          }
        })
      });
      if (!res.ok) throw new Error(`add failed: ${res.status}`);
      return docToEntry(await res.json());
    }

    async function deleteAllEntries(ids) {
      await Promise.all(ids.map(id =>
        fetch(`${BASE_URL}/${id}?key=${API_KEY}`, { method: 'DELETE' })
      ));
    }

    // ── Render ────────────────────────────────────────────────
    function formatTime(iso) {
      const d = new Date(iso);
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      const hh = String(d.getHours()).padStart(2, '0');
      const mi = String(d.getMinutes()).padStart(2, '0');
      return `${mm}/${dd} ${hh}:${mi}`;
    }

    function renderAll() {
      logList.innerHTML = '';
      entries.forEach(renderItem);
      actionRow.classList.toggle('hidden', entries.length === 0);
      scrollBottom();
    }

    function renderItem(entry) {
      const item = document.createElement('div');
      item.className = 'log-item';
      item.dataset.id = entry.id;

      const time = document.createElement('span');
      time.className = 'log-time';
      time.textContent = formatTime(entry.ts);

      const text = document.createElement('p');
      text.className = 'log-text';
      text.textContent = entry.text;

      item.appendChild(time);
      item.appendChild(text);
      logList.appendChild(item);
    }

    function scrollBottom() {
      logList.scrollTop = logList.scrollHeight;
    }

    // ── Sync ──────────────────────────────────────────────────
    async function sync() {
      try {
        syncStatus.textContent = '同期中…';
        entries = await fetchEntries();
        localStorage.setItem(CACHE_KEY, JSON.stringify(entries));
        renderAll();
        syncStatus.textContent = '';
      } catch (e) {
        // Fallback to cache
        const cached = localStorage.getItem(CACHE_KEY);
        if (cached) entries = JSON.parse(cached);
        renderAll();
        syncStatus.textContent = 'オフライン';
        console.error(e);
      }
    }

    // ── Input ─────────────────────────────────────────────────
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = inputEl.scrollHeight + 'px';
      sendBtn.classList.toggle('active', inputEl.value.trim().length > 0);
    });

    async function submit() {
      if (sendBtn.disabled) return;
      const text = inputEl.value.trim();
      if (!text) return;

      sendBtn.disabled = true;
      inputEl.value = '';
      inputEl.style.height = 'auto';
      sendBtn.classList.remove('active');

      try {
        await addEntry(text);
        await sync();
      } catch (e) {
        syncStatus.textContent = '送信失敗（オフライン）';
        console.error(e);
      } finally {
        sendBtn.disabled = false;
      }
    }

    sendBtn.addEventListener('click', submit);
    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        submit();
      }
    });

    // ── Copy ─────────────────────────────────────────────────
    copyBtn.addEventListener('click', () => {
      const text = entries.map(e => `[${formatTime(e.ts)}] ${e.text}`).join('\n');
      navigator.clipboard.writeText(text).then(() => showToast('コピーしました'));
    });

    // ── Obsidian export (Mac only) ────────────────────────────
    obsidianBtn.addEventListener('click', async () => {
      try {
        if (!obsidianFileHandle) {
          [obsidianFileHandle] = await window.showOpenFilePicker({
            types: [{ description: 'Markdown', accept: { 'text/markdown': ['.md'] } }],
            startIn: 'documents'
          });
        }
        const file     = await obsidianFileHandle.getFile();
        const existing = await file.text();
        const newLines = entries.map(e => `- [${formatTime(e.ts)}] ${e.text}`).join('\n');
        const writable = await obsidianFileHandle.createWritable();
        await writable.write(existing.trimEnd() + '\n\n' + newLines + '\n');
        await writable.close();
        showToast('Obsidianに書き出しました');
      } catch (e) {
        if (e.name !== 'AbortError') showToast('書き出し失敗');
      }
    });

    // ── Clear ─────────────────────────────────────────────────
    clearBtn.addEventListener('click', async () => {
      if (!confirm('全て削除しますか？')) return;
      const ids = entries.map(e => e.id);
      entries = [];
      localStorage.removeItem(CACHE_KEY);
      renderAll();
      try {
        await deleteAllEntries(ids);
      } catch (e) {
        console.error('delete failed:', e);
      }
    });

    // ── Toast ─────────────────────────────────────────────────
    let toastTimer;
    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1800);
    }

    // ── Init ─────────────────────────────────────────────────
    // まずキャッシュで即表示、バックグラウンドで同期
    const cached = localStorage.getItem(CACHE_KEY);
    if (cached) { entries = JSON.parse(cached); renderAll(); }
    sync();
    inputEl.focus();
  </script>
</body>
</html>
