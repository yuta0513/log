<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>log</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg:        #181818;
      --surface:   #222222;
      --fg:        #f0f0f0;
      --muted:     #666;
      --border:    #2e2e2e;
      --danger:    #ff453a;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .log-scroll {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 24px 20px 12px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .log-scroll::before {
      content: '';
      flex: 1;
    }

    .log-item {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .log-time {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    .log-text {
      font-size: 16px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--fg);
    }

    .bottom {
      flex-shrink: 0;
      padding: 10px 20px max(env(safe-area-inset-bottom), 16px);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--surface);
      border-radius: 16px;
      padding: 10px 10px 10px 16px;
    }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--fg);
      font-size: 16px;
      font-family: inherit;
      line-height: 1.5;
      resize: none;
      max-height: 110px;
      overflow-y: auto;
      caret-color: var(--fg);
    }

    textarea::placeholder { color: var(--muted); }

    .send-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px;
      color: var(--muted);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s;
    }

    .send-btn.active { color: var(--fg); }

    .action-row {
      display: flex;
      gap: 10px;
    }

    .action-row.hidden { display: none; }

    .action-btn {
      flex: 1;
      height: 42px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: opacity 0.15s;
    }

    .action-btn:active { opacity: 0.65; }

    .copy-btn {
      background: var(--surface);
      color: var(--fg);
    }

    .clear-btn {
      background: transparent;
      color: var(--danger);
      border: 1px solid #3a2020;
    }

    .toast {
      position: fixed;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: #333;
      color: var(--fg);
      font-size: 13px;
      padding: 7px 16px;
      border-radius: 20px;
      opacity: 0;
      transition: opacity 0.18s, transform 0.18s;
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .status {
      font-size: 11px;
      color: var(--muted);
      text-align: center;
      padding: 4px 0 0;
      letter-spacing: 0.02em;
      min-height: 16px;
    }
  </style>
</head>
<body>

  <div class="log-scroll" id="logList"></div>

  <div class="bottom">
    <div class="action-row hidden" id="actionRow">
      <button class="action-btn copy-btn" id="copyBtn">コピー</button>
      <button class="action-btn clear-btn" id="clearBtn">クリア</button>
    </div>
    <div class="input-row">
      <textarea id="input" placeholder="メモ" rows="1" autofocus>
      <button class="send-btn" id="sendBtn" aria-label="送信">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="11" stroke="currentColor" stroke-width="1.5"/>
          <path d="M12 16.5V7.5M8.5 11L12 7.5L15.5 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <div class="status" id="status"></div>
  </div>

  <div class="toast" id="toast">コピーしました</div>

  <!-- Firebase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/firebase@10.12.0/firebase-app-compat.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/firebase@10.12.0/firebase-firestore-compat.min.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDi-IgAIU9ZD_ahESxqeDD5sJLOYO8HVz4",
      authDomain: "logmemo-b0ad6.firebaseapp.com",
      projectId: "logmemo-b0ad6",
      storageBucket: "logmemo-b0ad6.firebasestorage.app",
      messagingSenderId: "931963988486",
      appId: "1:931963988486:web:3cfb62d710bb8742c8f187"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const logsCol = db.collection('logs');

    const inputEl   = document.getElementById('input');
    const sendBtn   = document.getElementById('sendBtn');
    const logList   = document.getElementById('logList');
    const actionRow = document.getElementById('actionRow');
    const copyBtn   = document.getElementById('copyBtn');
    const clearBtn  = document.getElementById('clearBtn');
    const toast     = document.getElementById('toast');
    const statusEl  = document.getElementById('status');

    let entries = [];

    function formatTime(ts) {
      const d = ts?.toDate ? ts.toDate() : new Date(ts);
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      const hh = String(d.getHours()).padStart(2, '0');
      const mi = String(d.getMinutes()).padStart(2, '0');
      return `${mm}/${dd} ${hh}:${mi}`;
    }

    function renderAll() {
      logList.innerHTML = '';
      entries.forEach(e => renderItem(e));
      actionRow.classList.toggle('hidden', entries.length === 0);
      scrollBottom();
    }

    function renderItem(entry) {
      const item = document.createElement('div');
      item.className = 'log-item';
      item.dataset.id = entry.id;

      const time = document.createElement('span');
      time.className = 'log-time';
      time.textContent = formatTime(entry.ts);

      const text = document.createElement('p');
      text.className = 'log-text';
      text.textContent = entry.text;

      item.appendChild(time);
      item.appendChild(text);
      logList.appendChild(item);
    }

    function scrollBottom() {
      logList.scrollTop = logList.scrollHeight;
    }

    // Real-time listener
    statusEl.textContent = '接続中…';
    logsCol.orderBy('ts', 'asc').onSnapshot(snapshot => {
      entries = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      renderAll();
      statusEl.textContent = '';
    }, err => {
      statusEl.textContent = '接続エラー';
      console.error(err);
    });

    // Auto-resize
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = inputEl.scrollHeight + 'px';
      sendBtn.classList.toggle('active', inputEl.value.trim().length > 0);
    });

    // Submit
    async function submit() {
      const text = inputEl.value.trim();
      if (!text) return;

      inputEl.value = '';
      inputEl.style.height = 'auto';
      sendBtn.classList.remove('active');

      await logsCol.add({
        text,
        ts: firebase.firestore.FieldValue.serverTimestamp()
      });
    }

    sendBtn.addEventListener('click', submit);
    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        submit();
      }
    });

    // Copy
    copyBtn.addEventListener('click', () => {
      const text = entries.map(e => `[${formatTime(e.ts)}] ${e.text}`).join('\n');
      navigator.clipboard.writeText(text).then(showToast);
    });

    // Clear
    clearBtn.addEventListener('click', async () => {
      if (!confirm('全て削除しますか？')) return;
      const batch = db.batch();
      const snap = await logsCol.get();
      snap.docs.forEach(d => batch.delete(d.ref));
      await batch.commit();
    });

    // Toast
    let toastTimer;
    function showToast() {
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 1800);
    }

    inputEl.focus();
  </script>
</body>
</html>
